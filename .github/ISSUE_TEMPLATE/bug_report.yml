name: Bug report
description: Something's broken.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include enough detail to reproduce. Do **not** report security issues here — see `SECURITY.md`.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description + expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Sign in as ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "main @ abc1234 or ghcr tag"
    validations:
      required: false
  - type: dropdown
    id: context
    attributes:
      label: Where
      options:
        - Local dev
        - Self-hosted via docker-compose
        - Installed PWA on phone
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant output from `docker compose logs app` or the browser console.
      render: shell
