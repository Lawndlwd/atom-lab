services:
  app:
    image: ghcr.io/lawndlwd/atom-lab:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5174:5174"
    env_file: .env
    environment:
      - NODE_ENV=production
      - SESSION_COOKIE_SECURE=true
      - DATABASE_URL=file:/app/data/identity.db
    volumes:
      - ./data:/app/data
