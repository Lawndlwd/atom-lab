services:
  app:
    build: .
    image: atom-lab-identity:latest
    env_file: .env
    environment:
      - NODE_ENV=production
      - SESSION_COOKIE_SECURE=true
      - DATABASE_URL=file:/app/data/identity.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    expose:
      - "5174"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
